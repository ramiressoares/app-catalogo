{% extends 'base.html' %}

{% block title %}Adicionar Peixe{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-lg-8">
        <div class="card shadow-sm">
            <div class="card-body p-3 p-md-4">
                <h1 class="h4 mb-3">Adicionar novo peixe</h1>

                <form method="post" enctype="multipart/form-data" class="row g-3">
                    <div class="col-12">
                        <label for="imagem" class="form-label">Foto</label>
                        <input type="file" name="foto" accept="image/*" required>
                    </div>

                    <div class="col-12">
                        <label for="nome_comum" class="form-label">Nome comum</label>
                        <input type="text" class="form-control" id="nome_comum" name="nome_comum" required>
                    </div>

                    <div class="col-12">
                        <label for="nome_cientifico" class="form-label">Nome científico</label>
                        <input type="text" class="form-control" id="nome_cientifico" name="nome_cientifico" required>
                    </div>

                    <div class="col-12">
                        <label for="regiao" class="form-label">Região</label>
                        <input type="text" class="form-control" id="regiao" name="regiao" required>
                    </div>

                    <div class="col-12">
                        <label for="descricao" class="form-label">Descrição</label>
                        <textarea class="form-control" id="descricao" name="descricao" rows="4" required></textarea>
                    </div>

                    <div class="col-12 d-grid d-sm-flex gap-2">
                        <button type="submit" class="btn btn-primary mobile-full-btn">Salvar peixe</button>
                        <a href="{{ url_for('index') }}" class="btn btn-outline-secondary mobile-full-btn">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
